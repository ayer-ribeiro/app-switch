<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Merchant – Pay with Bob Bucks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; margin: 0; background: #f7f7f7; }
    .button-group { display: flex; flex-direction: column; gap: 16px; max-width: 400px; margin: 32px auto 0 auto; padding: 0 16px; }
    button { font-size: 18px; padding: 16px 0; border-radius: 12px; border: none; background: #4CAF50; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.04); width: 100%; transition: background 0.2s; }
    button:active { background: #388E3C; }
    h1 { text-align: center; margin-top: 24px; color: #222; }
  </style>
</head>
<body>
  <h1>Merchant Checkout</h1>
  <form style="margin:32px auto 0 auto;max-width:400px;">
    <label for="amount" style="font-size:16px;display:block;margin-bottom:8px;">Payment Amount (USD):</label>
    <input type="number" id="amount" name="amount" placeholder="0.01" value="0.01" min="0.01" step="0.01"
      style="width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;">
  </form>
  <div class="button-group">
    <button id="pay-btn">Pay with Bob Bucks</button>
  </div>
  <script>
    document.getElementById('pay-btn').addEventListener('click', () => {
      const amount = document.getElementById('amount').value || '0.01';
      window.location.assign(`index.html?amount=${encodeURIComponent(amount)}`);
    });
  </script>
</body>
</html>
