<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4CAF50">
  <title>Bob Bucks Test</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; background: #f7f7f7; }
    h1, strong { color: #4CAF50; }
    button {
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 4px;
    }
    pre { background: #eee; padding: 12px; border-radius: 4px; overflow: auto; }
    pre.error { background: #fdd; color: #c00; }
    pre.info { background: #dfd; color: #060; }
  </style>
</head>
<body>
  <div id="contents">
    <h1>Bob Bucks Test</h1>
    <p>This merchant accepts Bob Bucks. <a href="pr.js">View source</a>.</p>
    <p>This is a demo website. No payment is being charged.</p>
    <p>The app's fingerprints should match the
      <a href="https://pay-nine-tan.vercel.app/manifest.json">manifest</a>.</p>
    <p>Price: USD <strong>$0.01</strong></p>
    <p><button onclick="onBuyClicked()">Invoke Payment App</button></p>
    <p><button onclick="clearAllMessages()">Clear messages</button></p>
    <div>
      <p>For debugging, override IS_READY_TO_PAY return value:</p>
      <select id="returnValue" onchange="onReturnValueChanged()">
        <option value="true" selected>True</option>
        <option value="false">False</option>
      </select>
    </div>
  </div>
  <pre id="msg"></pre>
  <script src="util.js"></script>
  <script src="pr.js"></script>
  <script src="redirect.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const amount = urlParams.get('amount') || '0.01';
    document.querySelector('strong').textContent = `$${amount}`;
    onBuyClicked(amount);
  </script>
</body>
</html>
